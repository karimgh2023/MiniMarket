{% extends "base.html" %}

{% block title %}Listing | MiniMarket{% endblock %}

{% block content %}
  <h1>{% if form.instance.pk %}Edit listing{% else %}Create listing{% endif %}</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>

  <p><a href="{% url 'listing_list' %}">Cancel</a></p>
{% endblock %}

{% extends "base.html" %}

{% block title %}Listing | MiniMarket{% endblock %}

{% block content %}
  <div class="bg-white rounded-3 shadow-sm p-4">
    <h1 class="h4 mb-3">{% if form.instance.pk %}Edit listing{% else %}Create listing{% endif %}</h1>

    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-outline-secondary" href="{% url 'listing_list' %}">Cancel</a>
      </div>
    </form>
  </div>
{% endblock %}

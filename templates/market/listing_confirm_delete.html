{% extends "base.html" %}

{% block title %}Delete | MiniMarket{% endblock %}

{% block content %}
  <div class="bg-white rounded-3 shadow-sm p-4">
    <h1 class="h4 mb-3">Delete listing</h1>
    <p>Are you sure you want to delete “{{ object.title }}”?</p>

    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button class="btn btn-danger" type="submit">Yes, delete</button>
      <a class="btn btn-outline-secondary" href="{% url 'listing_detail' object.pk %}">Cancel</a>
    </form>
  </div>
{% endblock %}

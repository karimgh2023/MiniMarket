{% extends "base.html" %}

{% block title %}Delete listing | MiniMarket{% endblock %}

{% block content %}
  <div class="mm-form-panel mm-narrow-delete">
    <h1 class="mm-form-title">Delete listing</h1>
    <p class="mm-form-sub mb-4">
      Are you sure you want to delete <span class="fw-semibold" style="color: #1a1a2e">“{{ object.title }}”</span>? This cannot be undone.
    </p>

    <form method="post" class="d-flex flex-wrap gap-3">
      {% csrf_token %}
      <button type="submit" class="btn-danger-custom">Yes, delete</button>
      <a class="btn-outline-gray-custom" href="{% url 'listing_detail' object.pk %}">Cancel</a>
    </form>
  </div>
{% endblock %}

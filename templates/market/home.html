{% extends "base.html" %}

{% block content %}
  <div class="p-4 p-md-5 mb-4 bg-white rounded-3 shadow-sm">
    <div class="col-lg-8 px-0">
      <h1 class="display-6 fw-bold">MiniMarket</h1>
      <p class="lead my-3">
        A simple marketplace to publish and browse listings.
      </p>
      <div class="d-flex gap-2">
        <a class="btn btn-primary" href="{% url 'listing_list' %}">Browse listings</a>
        {% if user.is_authenticated %}
          <a class="btn btn-outline-secondary" href="{% url 'listing_create' %}">Create a listing</a>
        {% else %}
          <a class="btn btn-outline-secondary" href="{% url 'login' %}?next={% url 'listing_create' %}">Login to create</a>
        {% endif %}
      </div>
    </div>
  </div>
{% endblock %}
